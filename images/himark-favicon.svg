<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <!-- Midnight backdrop fills the entire square favicon tile. -->
  <rect width="100" height="100" fill="#1C2B3A"/>
  <!-- Heavy architectural frame: stroke pulled right out to the
       viewBox edges so the frame reads as a thick outer border
       rather than a thin line set in from the tile edge. -->
  <rect x="7" y="7" width="86" height="86"
        fill="none" stroke="#F7F7F5" stroke-width="14"
        stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- H glyph: bigger bars (24 wide) pushed close to the frame
       on all sides so the wordmark sits inside the frame at
       maximum scale instead of floating in dead space. Split
       middle connector preserved. -->
  <g fill="#F7F7F5">
    <rect x="18" y="18" width="24" height="64"/>
    <rect x="58" y="18" width="24" height="64"/>
    <rect x="42" y="42" width="7" height="16"/>
    <rect x="51" y="42" width="7" height="16"/>
  </g>
</svg>

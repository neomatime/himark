<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HIMARK</title>
<meta name="description" content="HIMARK — Strategic Growth Consultancy. Entering."/>
<meta name="author" content="HIMARK"/>
<meta name="robots" content="noindex,follow"/>
<meta name="theme-color" content="#1C2B3A"/>
<link rel="canonical" href="https://www.himark.co.za/"/>

<!-- Prefetch the home page so the curtain handoff is instant -->
<link rel="prefetch" href="home.html"/>

<link rel="icon" type="image/x-icon" href="images/himark-favicon.ico"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="preconnect" href="https://fonts.cdnfonts.com" crossorigin/>
<!-- Source Sans 3 + JetBrains Mono via Google Fonts; DejaVu Sans
     (used for the IMΛRK wordmark) is served by cdnfonts.com — it's
     not in the Google Fonts catalogue. -->
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Source+Sans+3:wght@300;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.cdnfonts.com/css/dejavu-sans" rel="stylesheet"/>

<!-- No-JS hard fallback: refresh to home after 1s if scripts are disabled -->
<noscript><meta http-equiv="refresh" content="1;url=home.html"/></noscript>

<style>
/* ============================================================
   HIMARK — Animated Intro
   Four scenes, ~4.5–5s total, then midnight curtain → home.html
   Tokens mirror /styles/styles.css :root variables
   ============================================================ */

:root{
  --midnight: #1C2B3A;
  --ink-deep: #0E1822;
  --ocean:    #5F8190;
  --ocean-lt: #8AADB8;
  --mist:     #E2F0F0;
  --off:      #F7F7F5;

  --f-disp: 'Source Sans 3', 'Helvetica Neue', sans-serif;
  --f-mono: 'JetBrains Mono', 'Roboto Mono', monospace;
  --f-nav:  'Inter', sans-serif;
  /* DejaVu Sans for the wordmark — matches the supplied logo */
  --f-deja: 'DejaVu Sans', 'Verdana', 'Bitstream Vera Sans', sans-serif;

  --ease-out:   cubic-bezier(.16, 1, .3, 1);
  --ease-in:    cubic-bezier(.7, 0, .84, 0);
  --ease-trace: cubic-bezier(.65, 0, .35, 1);

  /* JS sets --h-shift to the px offset that puts the H glyph at viewport
     centre during scenes 1 & 2 (compensating for the invisible IMARK
     on its right). At scene 3, the offset returns to 0. */
  --h-shift: 0px;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  font-family:var(--f-disp);
  /* Dark gradient — black w/ subtle ocean glows in opposite corners
     so the H wordmark and ambient shapes have something to sit on
     without the field feeling flat. */
  background:
    radial-gradient(ellipse 70% 55% at 18% 22%, rgba(95,129,144,.18) 0%, transparent 60%),
    radial-gradient(ellipse 65% 55% at 82% 78%, rgba(138,173,184,.12) 0%, transparent 60%),
    linear-gradient(135deg, #050a12 0%, #1C2B3A 50%, #07101a 100%);
  color:var(--off);
  cursor:default;
}

/* ============================================================
   Editorial coordinate stamps — four corners, JetBrains Mono
   ============================================================ */
.coord{
  position:absolute;
  font-family:var(--f-mono);
  font-size:10px;
  font-weight:500;
  letter-spacing:.18em;
  color:rgba(138,173,184,.55);
  text-transform:uppercase;
  z-index:5;
  opacity:0;
  white-space:nowrap;
  animation:coordIn .8s var(--ease-out) .25s forwards;
}
.coord-tl{ top:28px;    left:36px;  }
.coord-tr{ top:28px;    right:36px; }
.coord-bl{ bottom:36px; left:36px;  }
.coord-br{ bottom:36px; right:36px; }

@keyframes coordIn{ to{ opacity:1; } }

/* ============================================================
   Wordmark stage
   - Anchor link wraps everything (also serves as no-JS fallback)
   - hmark is shifted right by --h-shift in scenes 1-2 so it
     visually centres on viewport, then animates back to 0 in
     scene 3 (sliding "left" relative to its starting screen position)
   ============================================================ */
.wordmark{
  position:absolute;
  left:50%; top:50%;
  transform:translate(-50%, -50%);
  display:flex;
  align-items:center;
  /* Tight gap between framed H and "I" — matches the reference */
  gap:4px;
  text-decoration:none;
  color:inherit;
  z-index:3;
  /* Hidden until JS has measured layout & positioned hmark.
     Removed by JS once measurement completes. */
  visibility:hidden;
}
.wordmark.ready{ visibility:visible; }

.hmark{
  flex-shrink:0;
  /* Slightly narrower framed-H per latest reference — keeps the
     ~0.7 aspect ratio but reduces overall display width ~12%. */
  width:clamp(50px, 7.5vw, 88px);
  /* Initial state: shifted right + faded + lifted.
     Uses transitions (not animations) so the transform isn't
     "locked" by animation-fill-mode when Scene 3 takes over. */
  transform:translate(var(--h-shift), 12px) scale(.96);
  opacity:0;
  transition:
    opacity   .9s  var(--ease-out),
    transform .9s  var(--ease-out);
  will-change:transform, opacity;
}
.hmark svg{
  display:block;
  width:100%;
  height:auto;
  /* Lift slightly so H optical-centres with IMARK cap-height */
  margin-top:-2px;
}

/* ---------- SCENE 1: H entrance (transition fires) ---------- */
.hmark.scene-1{
  opacity:1;
  transform:translate(var(--h-shift), 0) scale(1);
}

/* ---------- SCENE 2: frame trace ----------
   New frame perimeter = 2*(132+192) = 648 */
.hmark .frame{
  stroke-dasharray:648;
  stroke-dashoffset:648;
  transition:stroke-dashoffset 1.5s var(--ease-trace);
}
.hmark.scene-2 .frame{
  stroke-dashoffset:0;
}

/* ---------- SCENE 3a: H slides into wordmark position ----------
   The .65s transform transition overrides the .9s one above
   because .scene-3 is later in source order. */
.hmark.scene-3{
  transform:translate(0, 0) scale(1);
  transition:
    opacity   .9s  var(--ease-out),
    transform .65s var(--ease-out);
}

/* ============================================================
   IMARK reveal (Scene 3b) — IMAGE-BASED
   The IMARK wordmark is now images/IMARK.png (644×106 white-on-
   transparent, with the inverted V already baked in). A clip-path
   inset reveals it left-to-right in 5 discrete steps via
   `steps(5, end)` — five jumps over the reveal duration give a
   stepped, typewriter-style appearance instead of a smooth wipe.
   ============================================================ */
.imark{
  display:inline-flex;
  align-items:center;
  white-space:nowrap;
  line-height:1;
}
.imark-image{
  display:block;
  /* Height tuned to keep the new image's rendered WIDTH similar to
     the previous version's, so the wordmark composition (H + gap +
     IMARK) stays balanced. New aspect 367:99 ≈ 3.71, vs prior 6.08
     — so height bumps up roughly 1.6× to compensate. */
  height:clamp(36px, 7vw, 68px);
  width:auto;
  /* Lock rendered width before the image loads so measureAndPosition
     (which positions the H) is stable. */
  aspect-ratio:367 / 99;
  user-select:none;
  -webkit-user-drag:none;
  /* The new IMARK.png has proper transparency — no blend-mode hack
     needed. The transparent background lets the page gradient show
     through cleanly. */
  /* Hidden state — clipped to zero width from the right. */
  clip-path:inset(0 100% 0 0);
  -webkit-clip-path:inset(0 100% 0 0);
  /* 5 discrete reveal steps — typewriter feel for an image. */
  transition:clip-path .9s steps(5, end), -webkit-clip-path .9s steps(5, end);
}
.imark-image.show{
  clip-path:inset(0 0 0 0);
  -webkit-clip-path:inset(0 0 0 0);
}

/* Mono caret cursor that lives at the right edge of the wordmark
   during the typewriter, then fades out */
.caret{
  display:inline-block;
  width:3px;
  height:.78em;
  margin-left:6px;
  background:var(--off);
  opacity:0;
  vertical-align:baseline;
  transform:translateY(.04em);
  animation: caretBlink 1s steps(2,end) infinite;
}
.caret.active{ opacity:.9; }
.caret.done{
  animation:none;
  opacity:0;
  transition:opacity .4s ease-out;
}
@keyframes caretBlink{
  0%,49%   { opacity:.85; }
  50%,100% { opacity:0;   }
}

/* ============================================================
   SCENE 5 — random geometric lines crossing the page and
   a bracket frame drawing around the full HIMΛRK logo.
   Fires after the wordmark is fully assembled (~4.0s) and
   wraps before the midnight curtain (~5.5s).
   ============================================================ */

/* Full-page sweep-line layer (covers viewport, non-uniform scale) */
.s5-sweeps{
  position:fixed;
  inset:0;
  width:100vw; height:100vh;
  pointer-events:none;
  z-index:2;
  opacity:0;
  transition:opacity .25s ease-out;
}
.s5-sweeps.show{ opacity:1; }

.s5-sweeps .s5-line{
  fill:none;
  stroke:rgba(138,173,184,.55);
  stroke-width:1;
  /* pathLength="1" + dasharray=1 + dashoffset:1→0 draws the line
     proportionally regardless of how the line's geometry stretches
     with preserveAspectRatio="none". */
  stroke-dasharray:1;
  stroke-dashoffset:1;
  vector-effect:non-scaling-stroke;
  transition:stroke-dashoffset .55s var(--ease-trace);
}
.s5-sweeps.show .s5-line{ stroke-dashoffset:0; }

/* Stagger each line so the page reads as a swarm being drawn,
   not all-at-once. Negative values are unnecessary here — we want
   POSITIVE delays so the draw cascades. */
.s5-sweeps.show .l1{ transition-delay:.00s; }
.s5-sweeps.show .l2{ transition-delay:.05s; }
.s5-sweeps.show .l3{ transition-delay:.12s; }
.s5-sweeps.show .l4{ transition-delay:.18s; }
.s5-sweeps.show .l5{ transition-delay:.22s; }
.s5-sweeps.show .l6{ transition-delay:.28s; }
.s5-sweeps.show .l7{ transition-delay:.32s; transition-duration:.7s; }
.s5-sweeps.show .l8{ transition-delay:.42s; transition-duration:.7s; }

/* Centred bracket frame around the wordmark. Sized via CSS
   custom properties --wm-w / --wm-h that JS sets after measuring
   the rendered wordmark (so it always wraps the actual logo,
   not a guessed size). */
.s5-bracket{
  position:fixed;
  left:50%; top:50%;
  width:calc(var(--wm-w, 240px) + 56px);
  height:calc(var(--wm-h, 110px) + 36px);
  transform:translate(-50%, -50%);
  pointer-events:none;
  z-index:2;
  opacity:0;
  transition:opacity .25s ease-out;
}
.s5-bracket.show{ opacity:1; }

.s5-bracket svg{
  width:100%; height:100%;
  overflow:visible;
}
.s5-bracket .s5-bracket-rect{
  fill:none;
  stroke:rgba(138,173,184,.65);
  stroke-width:1.25;
  pathLength:1;
  stroke-dasharray:1;
  stroke-dashoffset:1;
  vector-effect:non-scaling-stroke;
  transition:stroke-dashoffset 1.1s var(--ease-trace) .35s;
}
.s5-bracket.show .s5-bracket-rect{ stroke-dashoffset:0; }

/* Four short corner accent lines that punch through the bracket
   corners — adds an architectural / "marker" feel rather than a
   plain rectangle. */
.s5-bracket .s5-corner{
  fill:none;
  stroke:rgba(226,240,240,.55);
  stroke-width:1.5;
  pathLength:1;
  stroke-dasharray:1;
  stroke-dashoffset:1;
  vector-effect:non-scaling-stroke;
  transition:stroke-dashoffset .45s var(--ease-out) .9s;
}
.s5-bracket.show .s5-corner{ stroke-dashoffset:0; }

/* ============================================================
   Thin progress bar — fills as scenes advance
   ============================================================ */
.progress-bar{
  position:absolute;
  bottom:0; left:0; right:0;
  height:2px;
  background:rgba(138,173,184,.15);
  z-index:6;
  overflow:hidden;
}
.progress-fill{
  position:absolute;
  inset:0 100% 0 0;
  background:var(--ocean-lt);
  /* Duration extended for Scene 5 — bar fills over full runtime
     before the curtain triggers at ~5.7s */
  transition:right 5.7s linear;
}
.progress-fill.running{ right:0; }

/* ============================================================
   Skip hint — subtle, fades in after scene 1
   ============================================================ */
.skip-hint{
  position:absolute;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  font-family:var(--f-mono);
  font-size:9px;
  font-weight:500;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:rgba(138,173,184,.45);
  opacity:0;
  animation:coordIn .8s var(--ease-out) 2.4s forwards;
  z-index:7;
  pointer-events:none;
}
.skip-hint::before,
.skip-hint::after{
  content:'';
  display:inline-block;
  width:14px; height:1px;
  background:rgba(138,173,184,.40);
  vertical-align:middle;
  margin:0 10px 2px;
}

/* ============================================================
   Scene 4 — Midnight curtain sweep
   ============================================================ */
.curtain{
  position:fixed;
  left:0; right:0;
  bottom:0;
  height:110vh;          /* extra height absorbs URL-bar jitter on mobile */
  background:var(--midnight);
  transform:translateY(100%);
  z-index:100;
  will-change:transform;
}
.curtain.up{
  transform:translateY(0);
  transition:transform .55s var(--ease-in);
}

/* ============================================================
   Responsive
   ============================================================ */
@media (max-width:720px){
  .coord{ font-size:8px; letter-spacing:.16em; }
  .coord-tl, .coord-tr{ top:18px; }
  .coord-bl, .coord-br{ bottom:26px; }
  .coord-tl, .coord-bl{ left:18px; }
  .coord-tr, .coord-br{ right:18px; }
  .skip-hint{ bottom:14px; font-size:8px; }
  .wordmark{ gap:6px; }
}

/* Hide coord stamps on very narrow / short viewports so they don't
   compete with the wordmark */
@media (max-width:380px),(max-height:480px){
  .coord-bl, .coord-br{ display:none; }
}

/* ============================================================
   Reduced motion — collapse all scenes, hold static wordmark,
   then run the curtain briefly
   ============================================================ */
@media (prefers-reduced-motion: reduce){
  .hmark, .hmark.scene-1, .hmark.scene-2, .hmark.scene-3{
    animation:none !important;
    transition:none !important;
    transform:translate(0,0) scale(1) !important;
    opacity:1 !important;
  }
  .hmark .frame{ stroke-dashoffset:0 !important; }
  /* IMARK image shown immediately, no stepped reveal */
  .imark-image{ clip-path:inset(0 0 0 0) !important; -webkit-clip-path:inset(0 0 0 0) !important; transition:none !important; }
  .caret{ display:none !important; }
  .progress-fill{ transition:right 1s linear !important; }
  .coord, .skip-hint{ animation:none !important; opacity:1 !important; }
  .curtain.up{ transition:transform .4s var(--ease-in) !important; }
  /* Scene 5: hold final state, no draw-in animation */
  .s5-sweeps .s5-line,
  .s5-bracket .s5-bracket-rect,
  .s5-bracket .s5-corner{
    transition:none !important;
    stroke-dashoffset:0 !important;
  }
}
</style>
</head>
<body>

<!-- ============================================================
     Corner coordinate stamps
     ============================================================ -->
<span class="coord coord-tl">[ INTRO · 01 ]</span>
<span class="coord coord-tr">EST · 2024 / RAND.ZA</span>
<span class="coord coord-bl">PRINCIPAL · COMMUNIQUÉ</span>
<span class="coord coord-br">SEQUENCE · IN.MOTION</span>

<!-- ============================================================
     Wordmark stage
     The anchor wrapper is also the no-JS fallback target.
     ============================================================ -->
<a href="home.html" class="wordmark" id="wordmark" aria-label="Enter HIMARK">

  <!-- HIMARK glyph — H + frame, both animatable.
       Geometry (matches the latest reference image):
       - viewBox 140x200 (~0.70 W:H)
       - Frame stroke-width 5 (was 2.5) — noticeably thicker
       - H bars wider + taller, sitting close to the frame's inner
         edge (only ~7 units of breathing room each side)
       - Vertical 4-unit split at x=68..72 cuts ONLY through the
         middle horizontal connector (above/below it passes through
         empty inter-bar space and shows as nothing)
       - Frame: x=4 y=4 w=132 h=192, perimeter = 648 -->
  <div class="hmark" id="hmark">
    <svg viewBox="0 0 140 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <g class="h-glyph">
        <!-- Left vertical leg (full height) -->
        <rect x="14" y="14" width="38" height="170" fill="#F7F7F5"/>
        <!-- Right vertical leg (full height) -->
        <rect x="88" y="14" width="38" height="170" fill="#F7F7F5"/>
        <!-- Middle connector — LEFT half -->
        <rect x="52" y="85" width="16" height="30" fill="#F7F7F5"/>
        <!-- 4-unit VERTICAL split at x=68..72 — left empty -->
        <!-- Middle connector — RIGHT half -->
        <rect x="72" y="85" width="16" height="30" fill="#F7F7F5"/>
      </g>
      <!-- Frame: drawn by stroke-dashoffset transition in Scene 2.
           Stroke-width 10 for the heavy architectural border the
           reference calls for. -->
      <rect class="frame"
            x="4" y="4" width="132" height="192"
            fill="none"
            stroke="#F7F7F5"
            stroke-width="10"
            stroke-linecap="square"
            stroke-linejoin="miter"/>
    </svg>
  </div>

  <!-- IMARK wordmark — image (images/IMARK.png with inverted V baked in)
       revealed left-to-right in 5 stepped chunks via clip-path for a
       typewriter-style appearance. -->
  <span class="imark" id="imark" aria-hidden="true"><img src="images/IMARK.png" alt="IMARK" class="imark-image" id="imarkImage"/><span class="caret" id="caret"></span></span>

</a>

<!-- ============================================================
     SCENE 5 — sweep lines crossing the page
     Full-viewport SVG with non-uniform scaling so lines that
     touch the viewBox edges always touch the viewport edges.
     ============================================================ -->
<svg class="s5-sweeps" id="s5Sweeps"
     viewBox="0 0 1000 600"
     preserveAspectRatio="none"
     aria-hidden="true">
  <!-- Horizontal sweeps -->
  <line class="s5-line l1" x1="0"   y1="92"  x2="1000" y2="92"  pathLength="1"/>
  <line class="s5-line l2" x1="0"   y1="486" x2="1000" y2="486" pathLength="1"/>
  <line class="s5-line l3" x1="0"   y1="148" x2="540"  y2="148" pathLength="1"/>
  <!-- Vertical sweeps -->
  <line class="s5-line l4" x1="160" y1="0"   x2="160"  y2="600" pathLength="1"/>
  <line class="s5-line l5" x1="845" y1="0"   x2="845"  y2="600" pathLength="1"/>
  <!-- Short verticals (random feel) -->
  <line class="s5-line l6" x1="92"  y1="380" x2="92"   y2="600" pathLength="1"/>
  <!-- Diagonal accents -->
  <line class="s5-line l7" x1="0"   y1="540" x2="280"  y2="380" pathLength="1"/>
  <line class="s5-line l8" x1="1000" y1="60" x2="720"  y2="220" pathLength="1"/>
</svg>

<!-- ============================================================
     SCENE 5 — bracket frame around the full wordmark.
     Sized via --wm-w / --wm-h custom properties (JS sets them
     after measuring the rendered wordmark).
     ============================================================ -->
<div class="s5-bracket" id="s5Bracket" aria-hidden="true">
  <svg viewBox="0 0 100 100" preserveAspectRatio="none">
    <!-- Main rectangle traces clockwise from top-left -->
    <rect class="s5-bracket-rect"
          x="0" y="0" width="100" height="100"
          pathLength="1"/>
    <!-- Four short corner accents that punch outward.
         Each is a tiny L drawn just outside the corner. -->
    <polyline class="s5-corner" points="-3,4 -3,-3 4,-3" pathLength="1"/>
    <polyline class="s5-corner" points="96,-3 103,-3 103,4" pathLength="1"/>
    <polyline class="s5-corner" points="103,96 103,103 96,103" pathLength="1"/>
    <polyline class="s5-corner" points="4,103 -3,103 -3,96" pathLength="1"/>
  </svg>
</div>

<!-- ============================================================
     Skip hint + progress bar
     ============================================================ -->
<span class="skip-hint">Tap anywhere to skip</span>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<!-- ============================================================
     Scene 4 — midnight curtain
     ============================================================ -->
<div class="curtain" id="curtain"></div>

<script>
/* ============================================================
   HIMARK — Intro Sequencer
   ============================================================ */
(function(){
  'use strict';

  const wordmark    = document.getElementById('wordmark');
  const hmark       = document.getElementById('hmark');
  const imark       = document.getElementById('imark');
  const imarkImage  = document.getElementById('imarkImage');
  const caret       = document.getElementById('caret');
  const progressFill= document.getElementById('progressFill');
  const curtain     = document.getElementById('curtain');
  const s5Sweeps    = document.getElementById('s5Sweeps');
  const s5Bracket   = document.getElementById('s5Bracket');

  const reducedMotion = window.matchMedia(
    '(prefers-reduced-motion: reduce)'
  ).matches;

  const timeouts = [];
  let isComplete = false;

  function schedule(fn, ms){
    const id = setTimeout(fn, ms);
    timeouts.push(id);
    return id;
  }

  function clearAllTimeouts(){
    timeouts.forEach(clearTimeout);
    timeouts.length = 0;
  }

  /* ------------------------------------------------------------
     Measure how far the hmark needs to be shifted right so it
     visually sits at viewport-centre while IMARK is invisible.
     The whole wordmark row is centred via translate(-50%); the
     hmark sits at the LEFT of that row, so we need to push the
     hmark right by half the IMARK width + half the gap.
     ------------------------------------------------------------ */
  function measureAndPosition(){
    const imarkWidth   = imark.offsetWidth;
    const hmarkWidth   = hmark.offsetWidth;
    const styles       = getComputedStyle(wordmark);
    const gap          = parseFloat(styles.gap) || 10;
    const shift        = (imarkWidth + gap) / 2;
    const totalWidth   = hmarkWidth + gap + imarkWidth;
    const totalHeight  = Math.max(hmark.offsetHeight, imark.offsetHeight);
    document.documentElement.style.setProperty('--h-shift', shift + 'px');
    /* Wordmark dimensions — feed Scene 5 bracket sizing */
    document.documentElement.style.setProperty('--wm-w', totalWidth  + 'px');
    document.documentElement.style.setProperty('--wm-h', totalHeight + 'px');
    wordmark.classList.add('ready');
  }

  /* ------------------------------------------------------------
     Run the four scenes
     ------------------------------------------------------------ */
  function runScenes(){
    // Progress bar starts immediately
    requestAnimationFrame(() => progressFill.classList.add('running'));

    if (reducedMotion){
      // Skip all entrances — wordmark is already fully visible by CSS
      hmark.classList.add('scene-1','scene-2','scene-3');
      imarkImage.classList.add('show');
      s5Sweeps.classList.add('show');
      s5Bracket.classList.add('show');
      schedule(triggerCurtain, 1200);
      return;
    }

    // SCENE 1 — H entrance (0 → 0.9s)
    hmark.classList.add('scene-1');

    // SCENE 2 — Frame trace (1.0s → 2.5s)
    schedule(() => {
      hmark.classList.add('scene-2');
    }, 1000);

    // SCENE 3a — H slides into wordmark position (2.5s → 3.15s)
    schedule(() => {
      hmark.classList.add('scene-3');
      caret.classList.add('active');
    }, 2500);

    // SCENE 3b — IMARK reveal via stepped clip-path (3.0s → 3.9s)
    // CSS handles the 5-step typewriter effect; we just toggle the class.
    schedule(() => {
      imarkImage.classList.add('show');
    }, 3000);

    // Caret stops blinking, fades out after final letter
    schedule(() => {
      caret.classList.remove('active');
      caret.classList.add('done');
    }, 3900);

    // SCENE 5 — sweep lines + bracket frame draw (4.0s → 5.5s)
    schedule(() => {
      s5Sweeps.classList.add('show');
      s5Bracket.classList.add('show');
    }, 4000);

    // SCENE 4/6 — Midnight curtain (5.7s → 6.25s) then navigate
    schedule(triggerCurtain, 5700);
  }

  /* ------------------------------------------------------------
     Scene 4 — fire the curtain and navigate when covered
     ------------------------------------------------------------ */
  function triggerCurtain(){
    if (isComplete) return;
    isComplete = true;
    curtain.classList.add('up');
    // 550ms matches the .55s curtain transition + a tiny buffer.
    // Use replace() so the intro doesn't pollute browser history.
    schedule(() => {
      window.location.replace('home.html');
    }, 560);
  }

  /* ------------------------------------------------------------
     Skip control — any click/tap/keypress jumps to Scene 4
     ------------------------------------------------------------ */
  function skipToEnd(e){
    if (isComplete) return;
    // Let the anchor's natural navigation handle direct clicks on
    // the wordmark link (also goes to home.html — same destination)
    if (e && e.target && e.target.closest && e.target.closest('a[href]')){
      return;
    }
    clearAllTimeouts();
    // Snap the H frame trace to drawn state instantly
    const frame = hmark.querySelector('.frame');
    frame.style.transition  = 'none';
    frame.style.strokeDashoffset = '0';
    // Force the full wordmark visible before the curtain sweeps in
    hmark.classList.add('scene-1','scene-2','scene-3');
    // Snap the IMARK image to fully revealed instantly
    imarkImage.style.transition = 'none';
    imarkImage.classList.add('show');
    caret.classList.remove('active');
    caret.classList.add('done');
    // Snap Scene 5 lines + bracket to drawn state
    s5Sweeps.querySelectorAll('.s5-line').forEach(el => {
      el.style.transition = 'none';
      el.style.strokeDashoffset = '0';
    });
    s5Bracket.querySelectorAll('.s5-bracket-rect, .s5-corner').forEach(el => {
      el.style.transition = 'none';
      el.style.strokeDashoffset = '0';
    });
    s5Sweeps.classList.add('show');
    s5Bracket.classList.add('show');
    progressFill.classList.add('running');
    progressFill.style.transitionDuration = '.25s';
    // Tiny breath, then curtain
    schedule(triggerCurtain, 240);
  }

  document.addEventListener('click',      skipToEnd, { passive: true });
  document.addEventListener('touchstart', skipToEnd, { passive: true });
  document.addEventListener('keydown',    skipToEnd);

  /* ------------------------------------------------------------
     Bootstrap — wait for fonts so IMARK width is measured
     against the rendered Source Sans 3, not a fallback.
     ------------------------------------------------------------ */
  function start(){
    measureAndPosition();
    // One frame to let the new --h-shift apply, then run scenes
    requestAnimationFrame(runScenes);
  }

  if (document.fonts && document.fonts.ready){
    // 1.5s safety timeout in case font loading stalls
    Promise.race([
      document.fonts.ready,
      new Promise(r => setTimeout(r, 1500))
    ]).then(start);
  } else {
    setTimeout(start, 100);
  }
})();
</script>

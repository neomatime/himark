<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <!-- Midnight backdrop fills the entire square favicon tile.
       Square viewBox so the browser doesn't letterbox the mark
       inside the favicon slot — the framed H now reads at full
       size on every tab strip. -->
  <rect width="100" height="100" fill="#1C2B3A"/>
  <!-- Heavy architectural frame, fully inside the viewBox so no
       part of the stroke is clipped. -->
  <rect x="6" y="6" width="88" height="88"
        fill="none" stroke="#F7F7F5" stroke-width="10"
        stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- H glyph with split middle connector — same identity as the
       wordmark on the loading page, scaled up to fill the frame. -->
  <g fill="#F7F7F5">
    <rect x="20" y="20" width="22" height="60"/>
    <rect x="58" y="20" width="22" height="60"/>
    <rect x="42" y="43" width="8" height="14"/>
    <rect x="50" y="43" width="8" height="14"/>
  </g>
</svg>

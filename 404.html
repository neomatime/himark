<head>

<meta name="robots" content="noindex,follow"/>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;0,800;1,300&display=swap" rel="stylesheet"/>

<link rel="apple-touch-icon" href="images/himark-favicon.svg"/>

<style>
  /* 404 — light-mode error page on the redesign system.

     The previous version was dark midnight with a centred error
     panel + the legacy chrome. This version pulls the redesign
     palette (pastel sky body, off-white card, glass pill-nav
     auto-injected by main.js) and recasts the panel as a tall
     editorial slab — same coord-stamp + display-headline language
     as the editorial heroes. */
  body[data-page="error"]{
    background: #D8E3E8;
    font-family: 'Source Sans 3', sans-serif;
    min-height: 100vh;
  }
  body[data-page="error"] .page.redesign{
    background: var(--off);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  /* The pill-nav injects at the top via main.js. The error block
     centres vertically in whatever space remains. */
  .nf-wrap{
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 140px clamp(24px, 6vw, 96px) 96px;
    text-align: center;
    position: relative;
  }
  .nf-coord-tl{
    position: absolute;
    top: 96px;
    left: clamp(24px, 6vw, 96px);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .18em;
    color: var(--ocean-dk);
  }
  .nf-coord-tr{
    position: absolute;
    top: 96px;
    right: clamp(24px, 6vw, 96px);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .18em;
    color: rgba(46,74,90,.55);
  }
  .nf-num{
    font-family: 'Source Sans 3', sans-serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(96px, 18vw, 220px);
    line-height: .85;
    letter-spacing: -.04em;
    color: var(--midnight);
    margin: 0 0 16px;
    opacity: .92;
  }
  .nf-rule{
    width: clamp(40px, 5vw, 72px);
    height: 1px;
    background: var(--ocean);
    margin: 0 auto 32px;
  }
  .nf-eyebrow{
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--ocean);
    margin: 0 0 18px;
  }
  .nf-hl{
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 700;
    font-size: clamp(32px, 4.4vw, 56px);
    line-height: 1.06;
    letter-spacing: -.012em;
    color: var(--midnight);
    margin: 0 0 24px;
    max-width: 760px;
  }
  .nf-hl em{
    font-style: italic;
    font-weight: 300;
    color: var(--ocean);
  }
  .nf-sub{
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 300;
    font-size: 15px;
    line-height: 1.7;
    color: rgba(28,43,58,.78);
    max-width: 540px;
    margin: 0 0 36px;
  }
  .nf-ctas{
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .nf-cta{
    display: inline-flex;
    align-items: center;
    gap: 10px;
    height: 44px;
    padding: 0 24px;
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .16em;
    text-transform: uppercase;
    text-decoration: none;
    transition: background .2s, color .2s, transform .2s;
  }
  .nf-cta-primary{
    background: var(--midnight);
    color: var(--off);
    box-shadow: 0 12px 28px -10px rgba(28,43,58,.30);
  }
  .nf-cta-primary:hover{
    background: var(--ink-deep);
    transform: translateY(-2px);
  }
  .nf-cta-ghost{
    background: transparent;
    color: var(--midnight);
    border: 1px solid rgba(28,43,58,.20);
  }
  .nf-cta-ghost:hover{
    border-color: var(--midnight);
    transform: translateY(-2px);
  }
  @media (max-width: 600px){
    .nf-wrap{ padding: 120px 22px 80px; }
    .nf-coord-tl, .nf-coord-tr{ top: 88px; font-size: 9px; }
  }
</style>
</head>
<body data-page="error" data-location="root">
<!-- pill-nav is injected at the top of .page by main.js — redesign chrome -->
<div class="page redesign active" id="page-error">

<main class="nf-wrap">
  <span class="nf-coord-tl">[ 404 · NOT.PART.OF.DOCTRINE ]</span>
  <span class="nf-coord-tr">REDIRECT · TO.FIRM</span>

  <p class="nf-num">404</p>
  <div class="nf-rule" aria-hidden="true"></div>
  <p class="nf-eyebrow">— Off the record</p>
  <h1 class="nf-hl">This page isn't<em>in the doctrine.</em></h1>
  <p class="nf-sub">The path you followed doesn't lead anywhere we publish. The firm operates by application — head back to the home page, or apply directly through Atlas.</p>

  <div class="nf-ctas">
    <a class="nf-cta nf-cta-primary" href="home.html">Back to HIMARK →</a>
    <a class="nf-cta nf-cta-ghost" href="apply.html">Apply through Atlas</a>
  </div>
</main>

</div>
<script src="main/main.js?v=1779906181500"></script>
</body>
</html>

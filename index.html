<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HIMARK</title>
<meta name="description" content="HIMARK — Strategic Growth Consultancy. Entering."/>
<meta name="author" content="HIMARK"/>
<meta name="robots" content="noindex,follow"/>
<meta name="theme-color" content="#1C2B3A"/>
<link rel="canonical" href="https://www.himark.co.za/"/>

<!-- Prefetch the home page so the curtain handoff is instant -->
<link rel="prefetch" href="home.html"/>

<link rel="icon" type="image/x-icon" href="images/himark-favicon.ico"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="preconnect" href="https://fonts.cdnfonts.com" crossorigin/>
<!-- Source Sans 3 + JetBrains Mono via Google Fonts; DejaVu Sans
     (used for the IMΛRK wordmark) is served by cdnfonts.com — it's
     not in the Google Fonts catalogue. -->
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Source+Sans+3:wght@300;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.cdnfonts.com/css/dejavu-sans" rel="stylesheet"/>

<!-- No-JS hard fallback: refresh to home after 1s if scripts are disabled -->
<noscript><meta http-equiv="refresh" content="1;url=home.html"/></noscript>

<style>
/* ============================================================
   HIMARK — Animated Intro
   Four scenes, ~4.5–5s total, then midnight curtain → home.html
   Tokens mirror /styles/styles.css :root variables
   ============================================================ */

:root{
  --midnight: #1C2B3A;
  --ink-deep: #0E1822;
  --ocean:    #5F8190;
  --ocean-lt: #8AADB8;
  --mist:     #E2F0F0;
  --off:      #F7F7F5;

  --f-disp: 'Source Sans 3', 'Helvetica Neue', sans-serif;
  --f-mono: 'JetBrains Mono', 'Roboto Mono', monospace;
  --f-nav:  'Inter', sans-serif;
  /* DejaVu Sans for the wordmark — matches the supplied logo */
  --f-deja: 'DejaVu Sans', 'Verdana', 'Bitstream Vera Sans', sans-serif;

  --ease-out:   cubic-bezier(.16, 1, .3, 1);
  --ease-in:    cubic-bezier(.7, 0, .84, 0);
  --ease-trace: cubic-bezier(.65, 0, .35, 1);

  /* JS sets --h-shift to the px offset that puts the H glyph at viewport
     centre during scenes 1 & 2 (compensating for the invisible IMARK
     on its right). At scene 3, the offset returns to 0. */
  --h-shift: 0px;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  font-family:var(--f-disp);
  /* Dark gradient — black w/ subtle ocean glows in opposite corners
     so the H wordmark and ambient shapes have something to sit on
     without the field feeling flat. */
  background:
    radial-gradient(ellipse 70% 55% at 18% 22%, rgba(95,129,144,.18) 0%, transparent 60%),
    radial-gradient(ellipse 65% 55% at 82% 78%, rgba(138,173,184,.12) 0%, transparent 60%),
    linear-gradient(135deg, #050a12 0%, #1C2B3A 50%, #07101a 100%);
  color:var(--off);
  cursor:default;
}

/* ============================================================
   Ambient geometric shapes — drift slowly across the page
   behind the wordmark. Hairline outlines in ocean-lt at low
   opacity so they read as atmosphere, not content.
   ============================================================ */
.bg-shapes{
  position:fixed;
  inset:0;
  overflow:hidden;
  z-index:0;
  pointer-events:none;
  opacity:0;
  animation:shapesIn 1.6s var(--ease-out) .3s forwards;
}
@keyframes shapesIn{ to{ opacity:1; } }

.shape{
  position:absolute;
  border:1px solid rgba(138,173,184,.22);
  background:transparent;
  will-change:transform;
}
.shape.sq    { width:80px;  height:80px; }
.shape.rect  { width:60px;  height:130px; }
.shape.tall  { width:42px;  height:180px; }
.shape.line  { width:1px;   height:120px; background:rgba(138,173,184,.22); border:none; }
.shape.circle{ width:70px;  height:70px; border-radius:50%; }
.shape.tri{
  width:0; height:0; border:none;
  border-left:38px solid transparent;
  border-right:38px solid transparent;
  border-bottom:62px solid rgba(138,173,184,.10);
  background:transparent;
}
.shape.dot{
  width:6px; height:6px;
  border-radius:50%;
  background:rgba(138,173,184,.35);
  border:none;
}

/* 13 individual placements + assigned drift animations.
   Negative animation-delay starts each shape mid-cycle so they
   feel asynchronous instead of all easing in lock-step. */
.s1  { top: 8%;    left: 4%;   animation: drift1 26s ease-in-out  -2s infinite; }
.s2  { top: 18%;   right: 9%;  animation: drift2 32s ease-in-out  -8s infinite; }
.s3  { bottom:12%; left:23%;   animation: drift3 22s ease-in-out  -3s infinite; }
.s4  { top: 42%;   left: 6%;   animation: drift4 28s ease-in-out -14s infinite; }
.s5  { bottom:18%; right: 6%;  animation: drift1 30s ease-in-out  -6s infinite; }
.s6  { top: 28%;   left:38%;   animation: drift2 24s ease-in-out -12s infinite; }
.s7  { bottom:32%; right:28%;  animation: drift3 27s ease-in-out  -4s infinite; }
.s8  { top: 14%;   left:58%;   animation: drift4 20s ease-in-out  -9s infinite; }
.s9  { bottom: 8%; left:48%;   animation: drift1 25s ease-in-out -15s infinite; }
.s10 { top: 64%;   right:42%;  animation: drift2 29s ease-in-out  -1s infinite; }
.s11 { top: 24%;   right: 4%;  animation: drift3 23s ease-in-out -11s infinite; }
.s12 { bottom:38%; left:62%;   animation: drift4 31s ease-in-out  -7s infinite; }
.s13 { top: 72%;   left: 9%;   animation: drift1 21s ease-in-out -13s infinite; }

@keyframes drift1{
  0%,100%{ transform:translate(0,0) rotate(0deg); }
  50%    { transform:translate(70px,-45px) rotate(14deg); }
}
@keyframes drift2{
  0%,100%{ transform:translate(0,0) rotate(0deg); }
  50%    { transform:translate(-55px,50px) rotate(-11deg); }
}
@keyframes drift3{
  0%,100%{ transform:translate(0,0) rotate(0deg); }
  50%    { transform:translate(45px,65px) rotate(18deg); }
}
@keyframes drift4{
  0%,100%{ transform:translate(0,0) rotate(0deg); }
  50%    { transform:translate(-60px,-30px) rotate(-16deg); }
}

/* ============================================================
   Editorial coordinate stamps — four corners, JetBrains Mono
   ============================================================ */
.coord{
  position:absolute;
  font-family:var(--f-mono);
  font-size:10px;
  font-weight:500;
  letter-spacing:.18em;
  color:rgba(138,173,184,.55);
  text-transform:uppercase;
  z-index:5;
  opacity:0;
  white-space:nowrap;
  animation:coordIn .8s var(--ease-out) .25s forwards;
}
.coord-tl{ top:28px;    left:36px;  }
.coord-tr{ top:28px;    right:36px; }
.coord-bl{ bottom:36px; left:36px;  }
.coord-br{ bottom:36px; right:36px; }

@keyframes coordIn{ to{ opacity:1; } }

/* ============================================================
   Wordmark stage
   - Anchor link wraps everything (also serves as no-JS fallback)
   - hmark is shifted right by --h-shift in scenes 1-2 so it
     visually centres on viewport, then animates back to 0 in
     scene 3 (sliding "left" relative to its starting screen position)
   ============================================================ */
.wordmark{
  position:absolute;
  left:50%; top:50%;
  transform:translate(-50%, -50%);
  display:flex;
  align-items:center;
  /* Tight gap between framed H and "I" — matches the reference */
  gap:4px;
  text-decoration:none;
  color:inherit;
  z-index:3;
  /* Hidden until JS has measured layout & positioned hmark.
     Removed by JS once measurement completes. */
  visibility:hidden;
}
.wordmark.ready{ visibility:visible; }

.hmark{
  flex-shrink:0;
  /* Slightly narrower framed-H per latest reference — keeps the
     ~0.7 aspect ratio but reduces overall display width ~12%. */
  width:clamp(50px, 7.5vw, 88px);
  /* Initial state: shifted right + faded + lifted.
     Uses transitions (not animations) so the transform isn't
     "locked" by animation-fill-mode when Scene 3 takes over. */
  transform:translate(var(--h-shift), 12px) scale(.96);
  opacity:0;
  transition:
    opacity   .9s  var(--ease-out),
    transform .9s  var(--ease-out);
  will-change:transform, opacity;
}
.hmark svg{
  display:block;
  width:100%;
  height:auto;
  /* Lift slightly so H optical-centres with IMARK cap-height */
  margin-top:-2px;
}

/* ---------- SCENE 1: H entrance (transition fires) ---------- */
.hmark.scene-1{
  opacity:1;
  transform:translate(var(--h-shift), 0) scale(1);
}

/* ---------- SCENE 2: frame trace ----------
   New frame perimeter = 2*(132+192) = 648 */
.hmark .frame{
  stroke-dasharray:648;
  stroke-dashoffset:648;
  transition:stroke-dashoffset 1.5s var(--ease-trace);
}
.hmark.scene-2 .frame{
  stroke-dashoffset:0;
}

/* ---------- SCENE 3a: H slides into wordmark position ----------
   The .65s transform transition overrides the .9s one above
   because .scene-3 is later in source order. */
.hmark.scene-3{
  transform:translate(0, 0) scale(1);
  transition:
    opacity   .9s  var(--ease-out),
    transform .65s var(--ease-out);
}

/* ============================================================
   IMARK typewriter (Scene 3b)
   Each letter is its own span — opacity + slight X-translate
   reveal, staggered ~110ms by JS.
   ============================================================ */
.imark{
  font-family:var(--f-deja);
  /* Regular weight (400) — the reference reads as normal, not bold.
     Size kept at the reduced clamp from the previous pass. */
  font-weight:400;
  font-size:clamp(24px, 4.5vw, 48px);
  letter-spacing:.01em;
  color:var(--off);
  line-height:1;
  white-space:nowrap;
  display:inline-block;
}
.letter{
  display:inline-block;
  opacity:0;
  transform:translateX(10px);
  transition:opacity .35s var(--ease-out), transform .35s var(--ease-out);
  will-change:transform, opacity;
}
.letter.show{
  opacity:1;
  transform:translateX(0);
}

/* Upside-down V — a real "V" character rotated 180° on a nested
   span so it inherits identical stroke weight, height, and width
   to the surrounding letters. The outer .letter handles the
   typewriter transform; the inner .inverted-v handles rotation,
   so the two transforms don't fight on a single element. */
.inverted-v{
  display:inline-block;
  transform:rotate(180deg);
  /* Pivot tuned by feedback iteration:
     - 55% put the V's wings below the baseline
     - 45% lifted the wings above the baseline
     - 47% still slightly above — small nudge down to 48% */
  transform-origin:50% 48%;
}

/* Mono caret cursor that lives at the right edge of the wordmark
   during the typewriter, then fades out */
.caret{
  display:inline-block;
  width:3px;
  height:.78em;
  margin-left:6px;
  background:var(--off);
  opacity:0;
  vertical-align:baseline;
  transform:translateY(.04em);
  animation: caretBlink 1s steps(2,end) infinite;
}
.caret.active{ opacity:.9; }
.caret.done{
  animation:none;
  opacity:0;
  transition:opacity .4s ease-out;
}
@keyframes caretBlink{
  0%,49%   { opacity:.85; }
  50%,100% { opacity:0;   }
}

/* ============================================================
   Thin progress bar — fills as scenes advance
   ============================================================ */
.progress-bar{
  position:absolute;
  bottom:0; left:0; right:0;
  height:2px;
  background:rgba(138,173,184,.15);
  z-index:6;
  overflow:hidden;
}
.progress-fill{
  position:absolute;
  inset:0 100% 0 0;
  background:var(--ocean-lt);
  transition:right 4.4s linear;
}
.progress-fill.running{ right:0; }

/* ============================================================
   Skip hint — subtle, fades in after scene 1
   ============================================================ */
.skip-hint{
  position:absolute;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  font-family:var(--f-mono);
  font-size:9px;
  font-weight:500;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:rgba(138,173,184,.45);
  opacity:0;
  animation:coordIn .8s var(--ease-out) 2.4s forwards;
  z-index:7;
  pointer-events:none;
}
.skip-hint::before,
.skip-hint::after{
  content:'';
  display:inline-block;
  width:14px; height:1px;
  background:rgba(138,173,184,.40);
  vertical-align:middle;
  margin:0 10px 2px;
}

/* ============================================================
   Scene 4 — Midnight curtain sweep
   ============================================================ */
.curtain{
  position:fixed;
  left:0; right:0;
  bottom:0;
  height:110vh;          /* extra height absorbs URL-bar jitter on mobile */
  background:var(--midnight);
  transform:translateY(100%);
  z-index:100;
  will-change:transform;
}
.curtain.up{
  transform:translateY(0);
  transition:transform .55s var(--ease-in);
}

/* ============================================================
   Responsive
   ============================================================ */
@media (max-width:720px){
  .coord{ font-size:8px; letter-spacing:.16em; }
  .coord-tl, .coord-tr{ top:18px; }
  .coord-bl, .coord-br{ bottom:26px; }
  .coord-tl, .coord-bl{ left:18px; }
  .coord-tr, .coord-br{ right:18px; }
  .skip-hint{ bottom:14px; font-size:8px; }
  .wordmark{ gap:6px; }
}

/* Hide coord stamps on very narrow / short viewports so they don't
   compete with the wordmark */
@media (max-width:380px),(max-height:480px){
  .coord-bl, .coord-br{ display:none; }
}

/* ============================================================
   Reduced motion — collapse all scenes, hold static wordmark,
   then run the curtain briefly
   ============================================================ */
@media (prefers-reduced-motion: reduce){
  .hmark, .hmark.scene-1, .hmark.scene-2, .hmark.scene-3{
    animation:none !important;
    transition:none !important;
    transform:translate(0,0) scale(1) !important;
    opacity:1 !important;
  }
  .hmark .frame{ stroke-dashoffset:0 !important; }
  .letter{ opacity:1 !important; transform:translateX(0) !important; }
  .caret{ display:none !important; }
  .progress-fill{ transition:right 1s linear !important; }
  .coord, .skip-hint{ animation:none !important; opacity:1 !important; }
  .curtain.up{ transition:transform .4s var(--ease-in) !important; }
}
</style>
</head>
<body>

<!-- ============================================================
     Ambient drifting geometric shapes (z-index 0, behind all)
     ============================================================ -->
<div class="bg-shapes" aria-hidden="true">
  <span class="shape sq     s1"></span>
  <span class="shape rect   s2"></span>
  <span class="shape line   s3"></span>
  <span class="shape circle s4"></span>
  <span class="shape tri    s5"></span>
  <span class="shape sq     s6"></span>
  <span class="shape tall   s7"></span>
  <span class="shape line   s8"></span>
  <span class="shape rect   s9"></span>
  <span class="shape dot    s10"></span>
  <span class="shape circle s11"></span>
  <span class="shape tri    s12"></span>
  <span class="shape line   s13"></span>
</div>

<!-- ============================================================
     Corner coordinate stamps
     ============================================================ -->
<span class="coord coord-tl">[ INTRO · 01 ]</span>
<span class="coord coord-tr">EST · 2024 / RAND.ZA</span>
<span class="coord coord-bl">PRINCIPAL · COMMUNIQUÉ</span>
<span class="coord coord-br">SEQUENCE · IN.MOTION</span>

<!-- ============================================================
     Wordmark stage
     The anchor wrapper is also the no-JS fallback target.
     ============================================================ -->
<a href="home.html" class="wordmark" id="wordmark" aria-label="Enter HIMARK">

  <!-- HIMARK glyph — H + frame, both animatable.
       Geometry (matches the latest reference image):
       - viewBox 140x200 (~0.70 W:H)
       - Frame stroke-width 5 (was 2.5) — noticeably thicker
       - H bars wider + taller, sitting close to the frame's inner
         edge (only ~7 units of breathing room each side)
       - Vertical 4-unit split at x=68..72 cuts ONLY through the
         middle horizontal connector (above/below it passes through
         empty inter-bar space and shows as nothing)
       - Frame: x=4 y=4 w=132 h=192, perimeter = 648 -->
  <div class="hmark" id="hmark">
    <svg viewBox="0 0 140 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <g class="h-glyph">
        <!-- Left vertical leg (full height) -->
        <rect x="14" y="14" width="38" height="170" fill="#F7F7F5"/>
        <!-- Right vertical leg (full height) -->
        <rect x="88" y="14" width="38" height="170" fill="#F7F7F5"/>
        <!-- Middle connector — LEFT half -->
        <rect x="52" y="85" width="16" height="30" fill="#F7F7F5"/>
        <!-- 4-unit VERTICAL split at x=68..72 — left empty -->
        <!-- Middle connector — RIGHT half -->
        <rect x="72" y="85" width="16" height="30" fill="#F7F7F5"/>
      </g>
      <!-- Frame: drawn by stroke-dashoffset transition in Scene 2.
           Stroke-width 10 for the heavy architectural border the
           reference calls for. -->
      <rect class="frame"
            x="4" y="4" width="132" height="192"
            fill="none"
            stroke="#F7F7F5"
            stroke-width="10"
            stroke-linecap="square"
            stroke-linejoin="miter"/>
    </svg>
  </div>

  <!-- "IM∧RK" — typewritten in Scene 3.
       The upside-down V is a real "V" character rotated 180° inside
       a nested span, so it has identical stroke weight, height, and
       width to the other letters (unlike Λ which often renders
       narrower in DejaVu Sans). -->
  <span class="imark" id="imark" aria-hidden="true"><span class="letter">I</span><span class="letter">M</span><span class="letter"><span class="inverted-v">V</span></span><span class="letter">R</span><span class="letter">K</span><span class="caret" id="caret"></span></span>

</a>

<!-- ============================================================
     Skip hint + progress bar
     ============================================================ -->
<span class="skip-hint">Tap anywhere to skip</span>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<!-- ============================================================
     Scene 4 — midnight curtain
     ============================================================ -->
<div class="curtain" id="curtain"></div>

<script>
/* ============================================================
   HIMARK — Intro Sequencer
   ============================================================ */
(function(){
  'use strict';

  const wordmark    = document.getElementById('wordmark');
  const hmark       = document.getElementById('hmark');
  const imark       = document.getElementById('imark');
  const letters     = imark.querySelectorAll('.letter');
  const caret       = document.getElementById('caret');
  const progressFill= document.getElementById('progressFill');
  const curtain     = document.getElementById('curtain');

  const reducedMotion = window.matchMedia(
    '(prefers-reduced-motion: reduce)'
  ).matches;

  const timeouts = [];
  let isComplete = false;

  function schedule(fn, ms){
    const id = setTimeout(fn, ms);
    timeouts.push(id);
    return id;
  }

  function clearAllTimeouts(){
    timeouts.forEach(clearTimeout);
    timeouts.length = 0;
  }

  /* ------------------------------------------------------------
     Measure how far the hmark needs to be shifted right so it
     visually sits at viewport-centre while IMARK is invisible.
     The whole wordmark row is centred via translate(-50%); the
     hmark sits at the LEFT of that row, so we need to push the
     hmark right by half the IMARK width + half the gap.
     ------------------------------------------------------------ */
  function measureAndPosition(){
    const imarkWidth = imark.offsetWidth;
    const styles     = getComputedStyle(wordmark);
    const gap        = parseFloat(styles.gap) || 10;
    const shift      = (imarkWidth + gap) / 2;
    document.documentElement.style.setProperty('--h-shift', shift + 'px');
    wordmark.classList.add('ready');
  }

  /* ------------------------------------------------------------
     Run the four scenes
     ------------------------------------------------------------ */
  function runScenes(){
    // Progress bar starts immediately
    requestAnimationFrame(() => progressFill.classList.add('running'));

    if (reducedMotion){
      // Skip all entrances — wordmark is already fully visible by CSS
      hmark.classList.add('scene-1','scene-2','scene-3');
      letters.forEach(l => l.classList.add('show'));
      schedule(triggerCurtain, 1000);
      return;
    }

    // SCENE 1 — H entrance (0 → 0.9s)
    hmark.classList.add('scene-1');

    // SCENE 2 — Frame trace (1.0s → 2.5s)
    schedule(() => {
      hmark.classList.add('scene-2');
    }, 1000);

    // SCENE 3a — H slides into wordmark position (2.5s → 3.15s)
    schedule(() => {
      hmark.classList.add('scene-3');
      caret.classList.add('active');
    }, 2500);

    // SCENE 3b — IMARK typewriter (3.0s → 3.9s)
    letters.forEach((letter, i) => {
      schedule(() => {
        letter.classList.add('show');
      }, 3000 + i * 110);
    });

    // Caret stops blinking, fades out after final letter
    schedule(() => {
      caret.classList.remove('active');
      caret.classList.add('done');
    }, 3600);

    // SCENE 4 — Midnight curtain (4.4s → 4.95s) then navigate
    schedule(triggerCurtain, 4400);
  }

  /* ------------------------------------------------------------
     Scene 4 — fire the curtain and navigate when covered
     ------------------------------------------------------------ */
  function triggerCurtain(){
    if (isComplete) return;
    isComplete = true;
    curtain.classList.add('up');
    // 550ms matches the .55s curtain transition + a tiny buffer.
    // Use replace() so the intro doesn't pollute browser history.
    schedule(() => {
      window.location.replace('home.html');
    }, 560);
  }

  /* ------------------------------------------------------------
     Skip control — any click/tap/keypress jumps to Scene 4
     ------------------------------------------------------------ */
  function skipToEnd(e){
    if (isComplete) return;
    // Let the anchor's natural navigation handle direct clicks on
    // the wordmark link (also goes to home.html — same destination)
    if (e && e.target && e.target.closest && e.target.closest('a[href]')){
      return;
    }
    clearAllTimeouts();
    // Snap the frame to its drawn state without waiting on the
    // 1.5s stroke-dashoffset transition. transition:none then
    // setting the value applies it instantly.
    const frame = hmark.querySelector('.frame');
    frame.style.transition  = 'none';
    frame.style.strokeDashoffset = '0';
    // Force the full wordmark visible before the curtain sweeps in
    hmark.classList.add('scene-1','scene-2','scene-3');
    letters.forEach(l => l.classList.add('show'));
    caret.classList.remove('active');
    caret.classList.add('done');
    progressFill.classList.add('running');
    progressFill.style.transitionDuration = '.25s';
    // Tiny breath, then curtain
    schedule(triggerCurtain, 220);
  }

  document.addEventListener('click',      skipToEnd, { passive: true });
  document.addEventListener('touchstart', skipToEnd, { passive: true });
  document.addEventListener('keydown',    skipToEnd);

  /* ------------------------------------------------------------
     Bootstrap — wait for fonts so IMARK width is measured
     against the rendered Source Sans 3, not a fallback.
     ------------------------------------------------------------ */
  function start(){
    measureAndPosition();
    // One frame to let the new --h-shift apply, then run scenes
    requestAnimationFrame(runScenes);
  }

  if (document.fonts && document.fonts.ready){
    // 1.5s safety timeout in case font loading stalls
    Promise.race([
      document.fonts.ready,
      new Promise(r => setTimeout(r, 1500))
    ]).then(start);
  } else {
    setTimeout(start, 100);
  }
})();
</script>

</body>
</html>
